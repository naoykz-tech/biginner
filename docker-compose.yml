services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biginner-dev
    init: true
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - next_cache:/workspace/.next
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  node_modules:
  next_cache:
