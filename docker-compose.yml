version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biginner-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=development
